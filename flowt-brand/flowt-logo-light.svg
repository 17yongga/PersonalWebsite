<svg width="280" height="80" viewBox="0 0 280 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="white" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.28"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <clipPath id="c">
      <rect width="80" height="80" rx="20"/>
    </clipPath>
  </defs>

  <rect width="80" height="80" rx="20" fill="url(#bg)"/>
  <g clip-path="url(#c)">
    <rect x="11" y="50" width="12" height="22" rx="3" fill="url(#barGrad)"/>
    <rect x="27" y="40" width="12" height="32" rx="3" fill="url(#barGrad)"/>
    <rect x="43" y="28" width="12" height="44" rx="3" fill="url(#barGrad)"/>
    <rect x="59" y="16" width="12" height="56" rx="3" fill="url(#barGrad)"/>
    <path d="M 17,50 C 20,51 28,43 33,40 C 38,37 44,31 49,28 C 54,25 62,17 65,16"
          stroke="white" stroke-width="2.5" fill="none"
          stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="17" cy="50" r="2.5" fill="white"/>
    <circle cx="33" cy="40" r="2.5" fill="white"/>
    <circle cx="49" cy="28" r="2.5" fill="white"/>
    <circle cx="65" cy="16" r="4" fill="white"/>
  </g>

  <text x="100" y="55"
        font-family="'SF Pro Display', 'Helvetica Neue', 'Century Gothic', Arial, sans-serif"
        font-size="44" font-weight="700" letter-spacing="-1.5"
        fill="url(#textGrad)">flowt</text>
</svg>
