<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Flowt Brand Preview</title>
  <style>
    body { margin: 0; font-family: -apple-system, sans-serif; background: #f1f5f9; }
    .section { padding: 48px; }
    .section h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; margin-bottom: 24px; }
    .white-bg { background: #ffffff; display: inline-block; padding: 32px 40px; border-radius: 16px; margin: 8px; }
    .dark-bg  { background: #0F172A; display: inline-block; padding: 32px 40px; border-radius: 16px; margin: 8px; }
    .gray-bg  { background: #f1f5f9; display: inline-block; padding: 32px 40px; border-radius: 16px; margin: 8px; }
    .row { display: flex; flex-wrap: wrap; align-items: center; gap: 16px; margin-bottom: 32px; }
    .label { font-size: 11px; color: #64748b; margin-top: 8px; text-align: center; }
    .card { display: flex; flex-direction: column; align-items: center; }
  </style>
</head>
<body>
  <div class="section">
    <h2>Flowt — Brand Assets Preview</h2>

    <h2>Icon</h2>
    <div class="row">
      <div class="card"><div class="white-bg"><img src="flowt-icon.svg" width="80"/></div><div class="label">White bg</div></div>
      <div class="card"><div class="dark-bg"><img src="flowt-icon.svg" width="80"/></div><div class="label">Dark bg</div></div>
      <div class="card"><div class="white-bg"><img src="flowt-icon.svg" width="48"/></div><div class="label">48px</div></div>
      <div class="card"><div class="white-bg"><img src="flowt-icon.svg" width="32"/></div><div class="label">32px</div></div>
      <div class="card"><div class="white-bg"><img src="flowt-icon.svg" width="20"/></div><div class="label">20px</div></div>
    </div>

    <h2>Horizontal Lockup — Light</h2>
    <div class="row">
      <div class="card"><div class="white-bg"><img src="flowt-logo-light.svg" width="260"/></div><div class="label">White bg</div></div>
      <div class="card"><div class="gray-bg"><img src="flowt-logo-light.svg" width="260"/></div><div class="label">Gray bg</div></div>
    </div>

    <h2>Horizontal Lockup — Dark</h2>
    <div class="row">
      <div class="card"><div class="dark-bg"><img src="flowt-logo-dark.svg" width="260"/></div><div class="label">Dark bg</div></div>
    </div>
  </div>
</body>
</html>
